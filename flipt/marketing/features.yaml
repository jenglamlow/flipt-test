version: "1.5"
namespace:
    key: marketing
    name: Marketing
flags:
    - key: homepage_hero_copy
      name: Homepage Hero Copy
      type: VARIANT_FLAG_TYPE
      description: Dynamic hero copy based on user attributes
      enabled: true
      defaultVariant: default_copy
      variants:
          - key: us_enterprise
            name: US Enterprise
            attachment: |
                {
                  "title": "Enterprise-grade analytics",
                  "subtitle": "Built for teams in the United States",
                  "cta": "Contact sales"
                }
          - key: de_free
            name: DE Free
            attachment: |
                {
                  "title": "Kostenlos starten",
                  "subtitle": "Analytik für deutsche Teams",
                  "cta": "Jetzt registrieren"
                }
          - key: pricing_returning
            name: Pricing Returning
            attachment: |
                {
                  "title": "Welcome back",
                  "subtitle": "See what's new in our pricing",
                  "cta": "Upgrade today"
                }
          - key: default_copy
            name: Default Copy
            attachment: |
                {
                  "title": "Welcome",
                  "subtitle": "Start exploring",
                  "cta": "Get started"
                }
      rules:
          - rank: 1
            segment: pricing_returning_segment
            distributions:
                - variant: pricing_returning
                  rollout: 100
          - rank: 2
            segment: us_enterprise_segment
            distributions:
                - variant: us_enterprise
                  rollout: 100
          - rank: 3
            segment: de_free_segment
            distributions:
                - variant: de_free
                  rollout: 100
segments:
    - key: us_enterprise_segment
      name: US Enterprise Segment
      match_type: ALL_MATCH_TYPE
      constraints:
          - type: STRING_COMPARISON_TYPE
            property: country
            operator: eq
            value: US
          - type: STRING_COMPARISON_TYPE
            property: plan
            operator: eq
            value: enterprise
    - key: de_free_segment
      name: DE Free Segment
      match_type: ALL_MATCH_TYPE
      constraints:
          - type: STRING_COMPARISON_TYPE
            property: country
            operator: eq
            value: DE
          - type: STRING_COMPARISON_TYPE
            property: plan
            operator: eq
            value: free
    - key: pricing_returning_segment
      name: Pricing Returning Segment
      match_type: ALL_MATCH_TYPE
      constraints:
          - type: STRING_COMPARISON_TYPE
            property: page
            operator: eq
            value: pricing
          - type: STRING_COMPARISON_TYPE
            property: isReturningVisitor
            operator: eq
            value: "true"
